<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <div class="eyebrow">Financial Dashboard</div>
        <h1 id="pageTitle">Cash Flow Overview</h1>
      </div>
      <div class="topbar-right">
        <label for="cycleSelect">Cycle</label>
        <select id="cycleSelect"></select>
      </div>
    </header>

    <section id="statusCard" class="card status-card">
      <div class="muted">Loading data from Google Sheets…</div>
    </section>

    <section class="kpi-grid" id="kpiGrid"></section>

    <section class="content-grid">
      <div class="card">
        <div class="section-title">Pergerakan Saldo</div>
        <div id="saldoFlow"></div>
      </div>

      <div class="card">
        <div class="section-title">Pengeluaran per Kategori</div>
        <div id="categorySummary"></div>
      </div>
    </section>

    <section class="content-grid lower">
      <div class="card">
        <div class="section-title">Proporsi dari Gaji</div>
        <div id="salaryProportion"></div>
      </div>

      <div class="card">
        <div class="section-title">Seluruh Transaksi</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Sub</th>
                <th>Category</th>
                <th class="num">Amount</th>
              </tr>
            </thead>
            <tbody id="txTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    window.APP_CONFIG = {
      DATA_URL: "https://script.google.com/macros/s/AKfycbz8S2Anz0vQ4O7WXCjQxHXjh1VQ3OVIWQphGePYoL--73Pk8tbYQClqLm-f5YhrqvtP/exec"
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
